<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" rx="28" fill="#1e1b4b"/>
  <defs>
    <linearGradient id="blade" x1="60" y1="15" x2="60" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f8fafc" />
      <stop offset="55%"  stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fde68a" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="drop" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#1e1b4b" flood-opacity="0.55" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sword 2 (behind) — tip top-left, pommel bottom-right -->
  <g transform="rotate(-45, 60, 50)" filter="url(#drop)">
    <path d="M60 15 L66 83 L60 90 L54 83 Z" fill="url(#blade)" stroke="#5b21b6" stroke-width="1.3" stroke-linejoin="round"/>
    <line x1="59" y1="20" x2="56.5" y2="78" stroke="white" stroke-width="1.6" stroke-opacity="0.38" stroke-linecap="round"/>
    <rect x="43" y="88" width="34" height="9" rx="4.5" fill="url(#gold)" stroke="#92400e" stroke-width="1.2"/>
    <rect x="56.5" y="97" width="7" height="17" rx="3" fill="#3b0764" stroke="#7c3aed" stroke-width="0.9"/>
    <line x1="56.5" y1="102" x2="63.5" y2="102" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="56.5" y1="107" x2="63.5" y2="107" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="56.5" y1="112" x2="63.5" y2="112" stroke="#a78bfa" stroke-width="0.8"/>
    <circle cx="60" cy="119" r="6" fill="url(#gold)" stroke="#92400e" stroke-width="1.2"/>
    <circle cx="58.5" cy="117.5" r="2" fill="white" opacity="0.4"/>
  </g>

  <!-- Sword 1 (on top) — tip top-right, pommel bottom-left -->
  <g transform="rotate(45, 60, 50)" filter="url(#drop)">
    <path d="M60 15 L66 83 L60 90 L54 83 Z" fill="url(#blade)" stroke="#5b21b6" stroke-width="1.3" stroke-linejoin="round"/>
    <line x1="59" y1="20" x2="56.5" y2="78" stroke="white" stroke-width="1.6" stroke-opacity="0.38" stroke-linecap="round"/>
    <rect x="43" y="88" width="34" height="9" rx="4.5" fill="url(#gold)" stroke="#92400e" stroke-width="1.2"/>
    <rect x="56.5" y="97" width="7" height="17" rx="3" fill="#3b0764" stroke="#7c3aed" stroke-width="0.9"/>
    <line x1="56.5" y1="102" x2="63.5" y2="102" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="56.5" y1="107" x2="63.5" y2="107" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="56.5" y1="112" x2="63.5" y2="112" stroke="#a78bfa" stroke-width="0.8"/>
    <circle cx="60" cy="119" r="6" fill="url(#gold)" stroke="#92400e" stroke-width="1.2"/>
    <circle cx="58.5" cy="117.5" r="2" fill="white" opacity="0.4"/>
  </g>

  <!-- Star sparkle at crossing -->
  <g transform="translate(60, 50)" filter="url(#glow)">
    <path d="M0,-11 L2.5,-2.5 L11,0 L2.5,2.5 L0,11 L-2.5,2.5 L-11,0 L-2.5,-2.5 Z" fill="white" opacity="0.95"/>
    <path d="M0,-6 L1.4,-1.4 L6,0 L1.4,1.4 L0,6 L-1.4,1.4 L-6,0 L-1.4,-1.4 Z" fill="#fde68a"/>
  </g>
</svg>
